      const fl = new THREE.PointLight(0xffaa33, 8, 5);
      fl.position.set(0, 1, -1.8); this.scene.add(fl);
      setTimeout(() => { flash.material.opacity = 0; this.scene.remove(fl); }, 150);
    }
    const oz = this.shotgunOnTable.position.z;
    this.shotgunOnTable.position.z += 0.05;
    await new Promise(r => setTimeout(r, 150));
    this.shotgunOnTable.position.z = oz;
  },

  opponentPutGunDown() {
    this.shotgunOnTable.position.set(0, 0.84, 0.1);
    this.shotgunOnTable.rotation.y = Math.PI / 2;
    this.shotgunOnTable.visible = true;
  },

  _animateGun(from, to, fromR, toR, dur) {
    return new Promise(resolve => {
      const st = performance.now();
      const anim = () => {
        const t = Math.min((performance.now() - st) / dur, 1);
        const e = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
        this.shotgunOnTable.position.lerpVectors(from, to, e);
        this.shotgunOnTable.rotation.y = fromR + (toR - fromR) * e;
        if (t < 1) requestAnimationFrame(anim); else resolve();
      };
      anim();
    });
  },

  opponentHitReaction() {
    return new Promise(resolve => {
      const head = this.opponentMesh.getObjectByName('opponentHead');
      if (!head) { resolve(); return; }
      const oc = head.material.color.getHex();
      head.material.color.setHex(0xff0000);
      this.opponentMesh.position.z -= 0.12;
      setTimeout(() => { head.material.color.setHex(oc); this.opponentMesh.position.z += 0.12; resolve(); }, 350);
    });
  },

  opponentDeath() {
    return new Promise(resolve => {
      const st = performance.now();
      const anim = () => {
        const t = Math.min((performance.now() - st) / 700, 1);
        this.opponentMesh.rotation.x = t * -0.5;
        this.opponentMesh.position.y = -t * 0.4;
        if (t < 1) requestAnimationFrame(anim); else resolve();
      };
      anim();
    });
  },

  resetOpponent() { this.opponentMesh.rotation.x = 0; this.opponentMesh.position.y = 0; },

  cameraShake() {
    return new Promise(resolve => {
      const op = this.camera.position.clone();
      let n = 0;
      const shake = () => {
        if (n >= 10) { this.camera.position.copy(op); resolve(); return; }
        const i = 0.1 * (1 - n / 10);
        this.camera.position.x = op.x + (Math.random() - 0.5) * i;
        this.camera.position.y = op.y + (Math.random() - 0.5) * i;
        n++; setTimeout(shake, 30);
      };
      shake();
    });
  },

  // ═══════════════════════════════════════════════════════
  // ANIMATION LOOP
  // Updates every frame: light flicker, dust drift, film
  // grain, TV static, water drips, creepy eyes, and the
  // pulsing red light behind the door.
  // ═══════════════════════════════════════════════════════

  _animate() {
    requestAnimationFrame(() => this._animate());
    const time = performance.now();

    // Light flicker
    if (this.flickerLight) {
      this.flickerLight.intensity = 3 + Math.sin(time * 0.004) * 0.2
        + Math.sin(time * 0.013) * 0.1 + (Math.random() < 0.02 ? -0.5 : 0);
    }

    // Dust drift
    if (this.dustParticles) {
      const pos = this.dustParticles.geometry.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        pos.array[i * 3] += Math.sin(time * 0.0003 + i) * 0.0003;
        pos.array[i * 3 + 1] += 0.00015;
        pos.array[i * 3 + 2] += Math.cos(time * 0.0004 + i) * 0.0002;
        if (pos.array[i * 3 + 1] > 3.8) pos.array[i * 3 + 1] = 0.1;
      }
      pos.needsUpdate = true;
    }

    // Film grain update (every 3 frames)
    if (Math.floor(time / 50) % 3 === 0) this._updateGrain();

    // TV static
    if (this._tvCtx && Math.floor(time / 80) % 2 === 0) {
      const ctx = this._tvCtx;
      const img = ctx.createImageData(64, 48);
      for (let i = 0; i < img.data.length; i += 4) {
        const v = Math.random() * 100;
        img.data[i] = v * 0.7; img.data[i+1] = v * 0.8; img.data[i+2] = v;
        img.data[i+3] = 255;
      }
      // Random horizontal glitch lines
      if (Math.random() < 0.1) {
        const y = Math.floor(Math.random() * 48);
        for (let x = 0; x < 64; x++) {
          const idx = (y * 64 + x) * 4;
          img.data[idx] = 150; img.data[idx+1] = 180; img.data[idx+2] = 200;
        }
      }
      ctx.putImageData(img, 0, 0);
      this._tvTexture.needsUpdate = true;
    }
    // TV light flicker
    if (this._tvLight) {
      this._tvLight.intensity = 0.15 + Math.random() * 0.1;
    }

    // Dripping water
    if (this._dripParticles) {
      this._dripParticles.forEach(drop => {
        drop.userData.vy -= 0.0003; // gravity
        drop.position.y += drop.userData.vy;
        if (drop.position.y < 0.01) {
          // Reset to top
          drop.position.set(-3.92, 1.48, 2.5);
          drop.userData.vy = 0;
        }
      });
    }

    // Creepy eyes - randomly appear and disappear
    if (this._creepyEyes) {
      this._creepyEyes.forEach((eye, i) => {
        // Eyes appear in pairs for ~2 seconds every ~8 seconds
        const cycle = (time * 0.001 + i * 0.5) % 10;
        eye.material.opacity = (cycle > 7 && cycle < 9) ? 0.6 + Math.sin(time * 0.01) * 0.2 : 0;
      });
    }

    // Pulsing red light behind door
    if (this._doorLight) {
      const pulse = Math.sin(time * 0.002) * 0.5 + 0.5; // 0 to 1
      this._doorLight.intensity = pulse * 0.15;
    }

    this.renderer.render(this.scene, this.camera);
  }
};

// ════════════════════════════════════════════════════════════
// BUCKSHOT GAME LOGIC
// ════════════════════════════════════════════════════════════
// ============================================================
// game.js -- Buckshot Roulette: core game logic
//
// Rules:
//   - 3 rounds, each player starts with 5 HP per round.
//   - Each round: shells loaded, items dealt, take turns.
//   - Pick up shotgun, aim at dealer or yourself, fire.
//   - Blank on self = extra turn. Eliminate the dealer to win.
//
// Items (unlocked in rounds 2-3):
//   - Magnifying Glass: peek at the current shell
//   - Cigarettes: restore 1 HP
//   - Beer: eject (skip) the current shell
//   - Handsaw: double damage on next shot
//   - Handcuffs: opponent skips their next turn
// ============================================================

const Game = {
  // ── Game State ────────────────────────────────────────────
  mode: null,       // 'offline' or 'online'
  round: 1,
  maxRounds: 3,
  paused: false,

  roundCharges: [5, 5, 5],  // HP per round

  playerLives: 5,
  dealerLives: 5,
  maxLives: 5,

  shells: [],       // array of 'live' | 'blank'
  shellIndex: 0,    // index of next shell to fire

  playerItems: [],
  dealerItems: [],
  maxItemsPerRound: [0, 2, 4],

  isPlayerTurn: true,
  turnActive: false,
  gameOver: false,
  _cuffed: false,   // true if opponent is handcuffed (skip turn)

  sawedOff: false,  // handsaw active (2x damage)
  knownShell: null,  // magnifying glass result

  els: {},          // cached DOM element references

  // ── Initialization ──────────────────────────────────────
  init() {
    this.els = {
      roundNumber: document.getElementById('round-number'),
      shellDisplay: document.getElementById('shell-display'),
      playerLives: document.getElementById('player-lives'),
      opponentLives: document.getElementById('opponent-lives'),
      playerItems: document.getElementById('player-items'),
      turnIndicator: document.getElementById('turn-indicator'),
      turnText: document.getElementById('turn-text'),
      actions: document.getElementById('actions'),
      itemButtons: document.getElementById('item-buttons'),
      messageDisplay: document.getElementById('message-display'),
      messageText: document.getElementById('message-text'),
      gameOver: document.getElementById('game-over'),
      gameOverText: document.getElementById('game-over-text'),
      gameScreen: document.getElementById('game-screen')
    };
  },

  /** Start a new game in the given mode ('offline' or 'online'). */
  start(mode) {
    this.mode = mode;
    this.round = 1;
    this.gameOver = false;
    this.sawedOff = false;
    this.knownShell = null;
    this._cuffed = false;

    this.els.gameScreen.classList.remove('hidden');
    this.els.gameOver.classList.add('hidden');
    this.els.actions.classList.add('hidden');

    GameScene.init();
    GameAudio.init();

    GameScene.onShoot = (target) => this.playerShoot(target);
    GameScene.onGunPickedUp = () => {
      this._showMessage('AIM & CLICK TO FIRE');
    };

    document.addEventListener('click', () => GameAudio.resume(), { once: true });

    this._startRound();
    SaveSystem.start(() => this.getSaveState());
  },

  /** Restore a previously saved game state. */
  restore(saved) {
    this.mode = saved.mode;
    this.round = saved.round || 1;
    this.playerLives = saved.playerLives;
    this.dealerLives = saved.dealerLives;
    this.maxLives = saved.maxLives;
    this.shells = saved.shells || [];
    this.shellIndex = saved.shellIndex || 0;
    this.playerItems = saved.playerItems || [];
    this.dealerItems = saved.dealerItems || [];
    this.isPlayerTurn = saved.isPlayerTurn !== false;
    this.gameOver = false;
    this.sawedOff = false;
    this.knownShell = null;
    this._cuffed = false;

    this.els.gameScreen.classList.remove('hidden');
    this.els.gameOver.classList.add('hidden');
    this.els.actions.classList.add('hidden');

    GameScene.init();
    GameAudio.init();
    GameScene.onShoot = (target) => this.playerShoot(target);
    GameScene.onGunPickedUp = () => this._showMessage('AIM & CLICK TO FIRE');
    document.addEventListener('click', () => GameAudio.resume(), { once: true });

    this.updateUI();

    if (this.shells.length === 0 || this.shellIndex >= this.shells.length) {
      this._loadNewShells();
    } else {
      this.startTurn();
    }

    SaveSystem.start(() => this.getSaveState());
  },

  // ── Round & Shell Management ─────────────────────────────

  /** Begin a new round: reset HP, load shells, deal items. */
  _startRound() {
    this.sawedOff = false;
    this.knownShell = null;
    this._cuffed = false;

    // Set charges for this round
    this.maxLives = this.roundCharges[this.round - 1] || 6;
    this.playerLives = this.maxLives;
    this.dealerLives = this.maxLives;

    this._showMessage('ROUND ' + this.round);

    setTimeout(() => {
      this._loadNewShells();
    }, 1500);
  },

  /** Shuffle new shells into the gun and deal items. */
  _loadNewShells() {
    this.sawedOff = false;
    this.knownShell = null;

    // Always at least 1 live and 1 blank; rest are random
    const shellCount = 2 + Math.floor(Math.random() * (this.round === 1 ? 3 : 5)); // 2-4 round 1, 2-6 round 2+
    this.shells = [];

    this.shells.push('live');
    this.shells.push('blank');

    for (let i = 2; i < shellCount; i++) {
      this.shells.push(Math.random() < 0.5 ? 'live' : 'blank');
    }

    // Shuffle
    for (let i = this.shells.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [this.shells[i], this.shells[j]] = [this.shells[j], this.shells[i]];
    }

    this.shellIndex = 0;

    // Deal items (none in round 1)
    const itemCount = this.maxItemsPerRound[this.round - 1] || 4;
    this.playerItems = this._generateItems(itemCount);
    this.dealerItems = this._generateItems(itemCount);

    // Announce shell count
    const liveCount = this.shells.filter(s => s === 'live').length;
    const blankCount = this.shells.filter(s => s === 'blank').length;

    GameAudio.playPump();
    this.updateUI();

    this._animateShellLoad().then(async () => {
      this._showMessage(liveCount + ' LIVE, ' + blankCount + ' BLANK');

      // Open item box, place items, then close
      if (this.playerItems.length > 0 || this.dealerItems.length > 0) {
        await this._delay(1200);
        if (GameScene.openItemBox) await GameScene.openItemBox();
        await this._delay(400);
        if (GameScene.placeItems) GameScene.placeItems(this.playerItems, this.dealerItems);
        this._showMessage('ITEMS DEALT');
        await this._delay(1000);
        if (GameScene.closeItemBox) await GameScene.closeItemBox();
        await this._delay(500);
      } else {
        await this._delay(1800);
      }

      this.startTurn();
    });
  },

  _generateItems(count) {
    if (count === 0) return [];
    // Buckshot Roulette items
    const itemTypes = ['magnifying_glass', 'cigarettes', 'beer', 'handsaw', 'handcuffs'];
    const items = [];
    for (let i = 0; i < count; i++) {
      items.push(itemTypes[Math.floor(Math.random() * itemTypes.length)]);
    }
    return items;
  },

  // ── Turn Logic ───────────────────────────────────────────

  /** Begin the current player's or dealer's turn. */
  startTurn() {
    if (this.gameOver) return;
    this.turnActive = true;
    this.sawedOff = false;
    this.knownShell = null;

    if (this.isPlayerTurn) {
      this.els.turnText.textContent = 'YOUR TURN';
      this.els.turnIndicator.classList.remove('hidden');
      this._renderItems();

      GameScene.enableGunPickup();

      setTimeout(() => {
        this.els.turnIndicator.classList.add('hidden');
        this._showMessage('PICK UP THE SHOTGUN');
      }, 1000);
    } else {
      this.els.turnText.textContent = "DEALER'S TURN";
      this.els.turnIndicator.classList.remove('hidden');
      this.els.itemButtons.classList.add('hidden');

      GameScene.disableInteraction();

      setTimeout(() => {
        this.els.turnIndicator.classList.add('hidden');
        this._dealerTurn();
      }, 1500);
    }
  },

  /** Player fires at 'opponent' or 'self'. Called by scene click. */
  async playerShoot(target) {
    if (!this.turnActive || !this.isPlayerTurn) return;
    this.turnActive = false;
    this.els.itemButtons.classList.add('hidden');

    const shell = this.shells[this.shellIndex];
    this.shellIndex++;

    if (shell === 'live') {
      GameAudio.playGunshot();
      await GameScene.fireEffect(true);
      const damage = this.sawedOff ? 2 : 1;

      await this._delay(200);
      GameScene.putGunDown();

      if (target === 'opponent') {
        this.dealerLives = Math.max(0, this.dealerLives - damage);
        await GameScene.opponentHitReaction();
        this._showMessage('LIVE ROUND! -' + damage);

        if (this.dealerLives <= 0) {
          this._roundWon();
          return;
        }
      } else {
        this.playerLives = Math.max(0, this.playerLives - damage);
        await GameScene.cameraShake();
        this._showMessage('LIVE ROUND! -' + damage);

        if (this.playerLives <= 0) {
          this._endGame(false);
          return;
        }
      }

      this.sawedOff = false;
      this.updateUI();
      this._checkShellsEmpty() || this._nextTurn(true);

    } else {
      GameAudio.playClick();
      await GameScene.fireEffect(false);
      await this._delay(200);
      GameScene.putGunDown();
      this._showMessage('*click* ... blank');

      this.sawedOff = false;
      this.updateUI();

      if (target === 'self') {
        // Blank on self = extra turn
        this._checkShellsEmpty() || this._nextTurn(false);
      } else {
        this._checkShellsEmpty() || this._nextTurn(true);
      }
    }

    if (this.mode === 'online') {
      Network.sendShoot({ target, shell });
    }
  },

  // ── Dealer AI ────────────────────────────────────────────

  /** Dealer (bot) takes their turn: use items, then shoot. */
  async _dealerTurn() {
    if (this.gameOver) return;

    // Dealer uses items
    await this._dealerUseItems();

    // Dealer decision
    let target;
    if (this.knownShell === 'blank') {
      target = 'self';
    } else if (this.knownShell === 'live') {
      target = 'opponent';
    } else {
      const remaining = this.shells.slice(this.shellIndex);
      const livesLeft = remaining.filter(s => s === 'live').length;
      const blanksLeft = remaining.length - livesLeft;

      if (remaining.length === 1) {
        target = remaining[0] === 'live' ? 'opponent' : 'self';
      } else if (blanksLeft > livesLeft) {
        target = 'self';
      } else {
        target = 'opponent';
      }
    }

    // Dealer animation
    await GameScene.opponentShootAnimation(target);

    this._showMessage(target === 'opponent' ? 'DEALER AIMS AT YOU...' : 'DEALER AIMS AT SELF...');
    await this._delay(800);

    const shell = this.shells[this.shellIndex];
    this.shellIndex++;

    if (shell === 'live') {
      GameAudio.playGunshot();
      await GameScene.opponentFireEffect(true);
      const damage = this.sawedOff ? 2 : 1;

      await this._delay(200);
      GameScene.opponentPutGunDown();

      if (target === 'opponent') {
        this.playerLives = Math.max(0, this.playerLives - damage);
        await GameScene.cameraShake();
        this._showMessage('LIVE ROUND! -' + damage);

        if (this.playerLives <= 0) {
          this._endGame(false);
          return;
        }
      } else {
        this.dealerLives = Math.max(0, this.dealerLives - damage);
        await GameScene.opponentHitReaction();
        this._showMessage('LIVE ROUND! -' + damage);

        if (this.dealerLives <= 0) {
          this._roundWon();
          return;
        }
      }

      this.sawedOff = false;
      this.updateUI();
      this._checkShellsEmpty() || this._nextTurn(true);

    } else {
      GameAudio.playClick();
      await GameScene.opponentFireEffect(false);
      await this._delay(200);
      GameScene.opponentPutGunDown();
      this._showMessage('*click* ... blank');

      this.sawedOff = false;
      this.updateUI();

      if (target === 'self') {
        this._checkShellsEmpty() || this._nextTurn(false);
      } else {
        this._checkShellsEmpty() || this._nextTurn(true);
      }
    }
  },

  /** Dealer AI uses items from their inventory before shooting. */
  async _dealerUseItems() {
    for (let i = this.dealerItems.length - 1; i >= 0; i--) {
      const item = this.dealerItems[i];

      if (item === 'magnifying_glass') {
        this.dealerItems.splice(i, 1);
        if (GameScene.removeDealerItem) GameScene.removeDealerItem(i);
        this.knownShell = this.shells[this.shellIndex];
        this._showMessage('DEALER USES MAGNIFYING GLASS');
        GameAudio.playItem();
        await this._delay(1200);

      } else if (item === 'handsaw') {
        this.dealerItems.splice(i, 1);
        if (GameScene.removeDealerItem) GameScene.removeDealerItem(i);
        this.sawedOff = true;
        this._showMessage('DEALER SAWS THE BARREL');
        GameAudio.playItem();
        await this._delay(1200);
        break;

      } else if (item === 'beer') {
        const remaining = this.shells.length - this.shellIndex;
        if (remaining > 1) {
          const ejected = this.shells[this.shellIndex];
          this.shellIndex++;
          this.dealerItems.splice(i, 1);
          if (GameScene.removeDealerItem) GameScene.removeDealerItem(i);
          this._showMessage('DEALER RACKS SHELL: ' + ejected.toUpperCase());
          GameAudio.playPump();
          await this._delay(1200);
          this.updateUI();
          if (this.shellIndex >= this.shells.length) return;
        }

      } else if (item === 'handcuffs') {
        this.dealerItems.splice(i, 1);
        if (GameScene.removeDealerItem) GameScene.removeDealerItem(i);
        this._cuffed = true;
        this._showMessage('DEALER USES HANDCUFFS');
        GameAudio.playItem();
        await this._delay(1200);

      } else if (item === 'cigarettes') {
        if (this.dealerLives < this.maxLives) {
          this.dealerItems.splice(i, 1);
          if (GameScene.removeDealerItem) GameScene.removeDealerItem(i);
          this.dealerLives = Math.min(this.maxLives, this.dealerLives + 1);
          this._showMessage('DEALER SMOKES A CIGARETTE (+1)');
          GameAudio.playItem();
          this.updateUI();
          await this._delay(1200);
        }
      }
    }
  },

  // ── Player Item Usage ────────────────────────────────────

  /** Player uses an item from their inventory by index. */
  useItem(index) {
    if (!this.turnActive || !this.isPlayerTurn) return;
    const item = this.playerItems[index];
    if (!item) return;

    this.playerItems.splice(index, 1);
    if (GameScene.removePlayerItem) GameScene.removePlayerItem(index);
    GameAudio.playItem();

    switch (item) {
      case 'magnifying_glass':
        this.knownShell = this.shells[this.shellIndex];
        this._showMessage('CURRENT SHELL: ' + this.knownShell.toUpperCase());
        this.updateUI();
        break;

      case 'beer':
        if (this.shellIndex < this.shells.length) {
          const ejected = this.shells[this.shellIndex];
          this.shellIndex++;
          this._showMessage('RACKED: ' + ejected.toUpperCase());
          this.knownShell = null;
          this.updateUI();
          if (this._checkShellsEmpty()) return;
        }
        break;

      case 'handsaw':
        this.sawedOff = true;
        this._showMessage('BARREL SAWED OFF (2x DAMAGE)');
        break;

      case 'handcuffs':
        this._showMessage('DEALER HANDCUFFED (SKIPS TURN)');
        this._cuffed = true;
        break;

      case 'cigarettes':
        if (this.playerLives < this.maxLives) {
          this.playerLives = Math.min(this.maxLives, this.playerLives + 1);
          this._showMessage('SMOKED CIGARETTE (+1 LIFE)');
          this.updateUI();
        } else {
          this._showMessage('ALREADY FULL HEALTH');
          // Give the item back since it wasn't used
          this.playerItems.splice(index, 0, item);
        }
        break;
    }

    this._renderItems();
  },

  // ── Turn Transitions ─────────────────────────────────────

  /** Advance to the next turn. If switchTurn=true, swap player/dealer. */
  _nextTurn(switchTurn) {
    setTimeout(() => {
      if (switchTurn) {
        if (this._cuffed && this.isPlayerTurn) {
          this._cuffed = false;
          this._showMessage('DEALER IS CUFFED - SKIP');
          setTimeout(() => this.startTurn(), 1200);
          return;
        } else if (this._cuffed && !this.isPlayerTurn) {
          this._cuffed = false;
          this._showMessage('YOU ARE CUFFED - SKIP');
          setTimeout(() => this.startTurn(), 1200);
          return;
        }
        this.isPlayerTurn = !this.isPlayerTurn;
      }
      this.knownShell = null;
      this.startTurn();
    }, 1500);
  },

  _checkShellsEmpty() {
    if (this.shellIndex >= this.shells.length) {
      // Reload new shells (same round continues)
      this._showMessage('RELOADING...');
      setTimeout(() => this._loadNewShells(), 1500);
      return true;
    }
    return false;
  },

  // ── Win/Lose Conditions ──────────────────────────────────

  /** Called when the dealer's HP hits 0. Advance round or win game. */
  _roundWon() {
    this.updateUI();

    if (this.round >= this.maxRounds) {
      // Won the whole game
      this._endGame(true);
    } else {
      this._showMessage('ROUND ' + this.round + ' COMPLETE');
      GameAudio.playWin();
      GameScene.opponentDeath();

      setTimeout(() => {
        GameScene.resetOpponent();
        this.round++;
        this._startRound();
      }, 2500);
    }
  },

  _endGame(playerWon) {
    this.gameOver = true;
    this.turnActive = false;
    SaveSystem.stop();
    SaveSystem.clear();

    this.els.itemButtons.classList.add('hidden');
    this.els.turnIndicator.classList.add('hidden');

    GameScene.disableInteraction();

    if (playerWon) {
      GameAudio.playWin();
      this.els.gameOverText.textContent = 'YOU WIN';
      this.els.gameOverText.style.color = '#44ff44';
      GameScene.opponentDeath();
    } else {
      GameAudio.playLose();
      this.els.gameOverText.textContent = 'YOU LOSE';
      this.els.gameOverText.style.color = '#ff4444';
      GameScene.cameraShake();
    }

    setTimeout(() => {
      this.els.gameOver.classList.remove('hidden');
    }, 2000);
  },

  // ── UI Updates ───────────────────────────────────────────

  /** Refresh all HUD elements: shell display, lives, round info. */
  updateUI() {
    // Shell display
    this.els.shellDisplay.innerHTML = '';
    for (let i = 0; i < this.shells.length; i++) {
      const div = document.createElement('div');
      div.className = 'shell';
      if (i < this.shellIndex) {
        div.classList.add('used');
        div.classList.add(this.shells[i]);
      } else if (i === this.shellIndex && this.knownShell) {
        div.classList.add(this.knownShell);
      } else {
        div.classList.add('unknown');
      }
      this.els.shellDisplay.appendChild(div);
    }

    const remainingShells = this.shells.slice(this.shellIndex);
    const liveCount = remainingShells.filter(s => s === 'live').length;
    const blankCount = remainingShells.filter(s => s === 'blank').length;
    this.els.roundNumber.textContent = 'ROUND ' + this.round +
      ' \u00B7 ' + liveCount + ' LIVE \u00B7 ' + blankCount + ' BLANK';

    // Player lives (charges)
    this.els.playerLives.innerHTML = '';
    for (let i = 0; i < this.maxLives; i++) {
      const div = document.createElement('div');
      div.className = 'life' + (i >= this.playerLives ? ' lost' : '');
      this.els.playerLives.appendChild(div);
    }

    // Dealer lives
    this.els.opponentLives.innerHTML = '';
    for (let i = 0; i < this.maxLives; i++) {
      const div = document.createElement('div');
      div.className = 'life' + (i >= this.dealerLives ? ' lost' : '');
      this.els.opponentLives.appendChild(div);
    }
  },

  /** Render clickable item buttons for the player's inventory. */
  _renderItems() {
    const container = this.els.itemButtons;
    container.innerHTML = '';

    if (!this.isPlayerTurn || this.playerItems.length === 0) {
      container.classList.add('hidden');
      return;
    }

    container.classList.remove('hidden');

    const icons = {
      magnifying_glass: '\uD83D\uDD0D',
      cigarettes: '\uD83D\uDEAC',
      beer: '\uD83C\uDF7A',
      handsaw: '\uD83E\uDE93',
      handcuffs: '\u26D3\uFE0F'
    };

    const labels = {
      magnifying_glass: 'Peek at current shell',
      cigarettes: 'Restore 1 life',
      beer: 'Rack (eject) current shell',
      handsaw: 'Double damage next shot',
      handcuffs: 'Dealer skips next turn'
    };

    this.playerItems.forEach((item, i) => {
      const btn = document.createElement('div');
      btn.className = 'item';
      btn.textContent = icons[item] || '?';
      btn.title = labels[item] || item;
      btn.addEventListener('click', () => this.useItem(i));
      container.appendChild(btn);
    });

    this.els.playerItems.innerHTML = '';
    this.playerItems.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'item';
      div.textContent = icons[item] || '?';
      div.title = labels[item] || item;
      div.addEventListener('click', () => this.useItem(i));
      this.els.playerItems.appendChild(div);
    });
  },

  // ── Helpers ──────────────────────────────────────────────

  /** Show a floating message that auto-fades after 2 seconds. */
  _showMessage(text) {
    this.els.messageText.textContent = text;
    this.els.messageDisplay.classList.remove('hidden');
    const clone = this.els.messageText.cloneNode(true);
    this.els.messageText.parentNode.replaceChild(clone, this.els.messageText);
    this.els.messageText = clone;
    setTimeout(() => { this.els.messageDisplay.classList.add('hidden'); }, 2000);
  },

  async _animateShellLoad() {
    for (let i = 0; i < this.shells.length; i++) {
      GameAudio.playLoad();
      await this._delay(250);
    }
    GameAudio.playPump();
  },

  _delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  },

  // ── Save & Pause ─────────────────────────────────────────

  /** Return current state for auto-save (null if game is over). */
  getSaveState() {
    if (this.gameOver) return null;
    return {
      mode: this.mode, round: this.round,
      playerLives: this.playerLives, dealerLives: this.dealerLives,
      maxLives: this.maxLives,
      shells: this.shells, shellIndex: this.shellIndex,
      playerItems: this.playerItems, dealerItems: this.dealerItems,
      isPlayerTurn: this.isPlayerTurn
    };
  },

  togglePause() {
    if (this.gameOver) return;
    if (!this.paused) {
      this.pause();
    } else {
      this.resume();
    }
  },

  pause() {
    this.paused = true;
    document.getElementById('pause-menu').classList.remove('hidden');
    // Disable gun interaction while paused
    if (GameScene.canInteract) {
      this._wasInteractable = true;
      GameScene.canInteract = false;
    }
  },

  resume() {
    this.paused = false;
    document.getElementById('pause-menu').classList.add('hidden');
    if (this._wasInteractable) {
      GameScene.canInteract = true;
      this._wasInteractable = false;
    }
  },

  quit() {
    this.paused = false;
    this.gameOver = true;
    SaveSystem.stop();
    document.getElementById('pause-menu').classList.add('hidden');
    location.reload();
  }
};

// ════════════════════════════════════════════════════════════
// FPS ARENA MODE
// ════════════════════════════════════════════════════════════
// ============================================================
// fps-game.js -- 3D First-Person Shooter arena mode
//
// A simple FPS with WASD movement, mouse aim, and a bot
// opponent. Uses Three.js for rendering and PointerLock
// for mouse capture. The bot has 3 states: patrol, chase,
// and attack. Both player and bot respawn after 3 seconds.
// ============================================================

const FPSGame = {
  // ── Three.js Core ───────────────────────────────────────
  scene: null,
  camera: null,
  renderer: null,
  controls: null,   // PointerLockControls
  running: false,
  lastTime: 0,

  // ── Player State ────────────────────────────────────────
  health: 100,
  kills: 0,
  deaths: 0,
  alive: true,
  speed: 12,
  eyeHeight: 1.7,
  position: new THREE.Vector3(),
  keys: { w: false, a: false, s: false, d: false },
  shooting: false,
  lastShotTime: 0,
  shotCooldown: 200, // ms between shots

  // ── Bot State ───────────────────────────────────────────
  botMesh: null,
  botHealth: 100,
  botAlive: true,
  botPosition: new THREE.Vector3(),
  botState: 'patrol',  // 'patrol' | 'chase' | 'attack'
  botWaypoint: new THREE.Vector3(),
  botShootTimer: 0,
  botRespawnTimer: 0,

  // ── Arena & Effects ─────────────────────────────────────
  collidables: [],   // walls & obstacles for collision
  raycaster: null,
  tracers: [],       // bullet tracer lines (auto-removed)
  footstepTimer: 0,

  // ── Setup ────────────────────────────────────────────────

  /** Initialize the FPS scene, controls, arena, and start the game loop. */
  init() {
    // Clean up any previous canvas/overlays
    const oldCanvas = document.querySelector('canvas');
    if (oldCanvas) oldCanvas.remove();
    ['post-fx', 'scanlines', 'film-grain', 'chroma-ab'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.remove();
    });

    // Renderer
    this.renderer = new THREE.WebGLRenderer({ antialias: true });
    this.renderer.setSize(window.innerWidth, window.innerHeight);
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    this.renderer.shadowMap.enabled = true;
    document.body.insertBefore(this.renderer.domElement, document.body.firstChild);

    // Scene
    this.scene = new THREE.Scene();
    this.scene.background = new THREE.Color(0x111122);
    this.scene.fog = new THREE.Fog(0x111122, 20, 60);

    // Camera
    this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);

    // Controls
    this.controls = new THREE.PointerLockControls(this.camera, this.renderer.domElement);

    // Lighting
    this.scene.add(new THREE.AmbientLight(0x556677, 0.8));
    const sun = new THREE.DirectionalLight(0xffeedd, 1.2);
    sun.position.set(10, 20, 10); sun.castShadow = true;
    this.scene.add(sun);

    // HUD
    this._createHUD();

    // Build arena
    this._buildArena();

    // Build bot
    this._buildBot();

    // Raycaster
    this.raycaster = new THREE.Raycaster();
    this.raycaster.far = 100;

    // Spawn player
    this.position.set(-25, this.eyeHeight, -25);
    this.camera.position.copy(this.position);

    // Input
    this._setupInput();

    // Resize
    window.addEventListener('resize', () => {
      this.camera.aspect = window.innerWidth / window.innerHeight;
      this.camera.updateProjectionMatrix();
      this.renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Audio
    GameAudio.init();

    this.running = true;
    this.alive = true;
    this.health = 100;
    this.kills = 0;
    this.deaths = 0;
    this.lastTime = performance.now();

    // Show click to play
    this.hud.overlay.style.display = 'flex';

    this._loop();
  },

  // ── HUD ──────────────────────────────────────────────────

  /** Build the FPS HUD overlay (health bar, score, crosshair, death screen). */
  _createHUD() {
    const old = document.getElementById('fps-hud');
    if (old) old.remove();

    const hud = document.createElement('div');
    hud.id = 'fps-hud';
    hud.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50;font-family:Courier New,monospace;color:#fff;';

    // Crosshair
    hud.innerHTML = `
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);">
        <div style="position:absolute;width:2px;height:16px;background:rgba(255,255,255,0.7);left:-1px;top:-20px;"></div>
        <div style="position:absolute;width:2px;height:16px;background:rgba(255,255,255,0.7);left:-1px;top:4px;"></div>
        <div style="position:absolute;width:16px;height:2px;background:rgba(255,255,255,0.7);top:-1px;left:-20px;"></div>
        <div style="position:absolute;width:16px;height:2px;background:rgba(255,255,255,0.7);top:-1px;left:4px;"></div>
      </div>
      <div id="fps-health" style="position:absolute;bottom:30px;left:30px;">
        <div style="width:200px;height:20px;background:rgba(0,0,0,0.5);border:1px solid #555;border-radius:3px;overflow:hidden;">
          <div id="fps-health-bar" style="width:100%;height:100%;background:linear-gradient(90deg,#44ff44,#22cc22);transition:width 0.2s;"></div>
        </div>
        <div id="fps-health-text" style="font-size:14px;margin-top:4px;">HP: 100</div>
      </div>
      <div id="fps-score" style="position:absolute;top:15px;left:50%;transform:translateX(-50%);font-size:18px;background:rgba(0,0,0,0.5);padding:6px 16px;border-radius:4px;">
        Kills: 0 | Deaths: 0
      </div>
      <div id="fps-killfeed" style="position:absolute;top:60px;right:20px;text-align:right;font-size:13px;"></div>
      <div id="fps-damage-flash" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;background:radial-gradient(ellipse at center,transparent 50%,rgba(255,0,0,0.4) 100%);opacity:0;transition:opacity 0.15s;"></div>
      <div id="fps-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);z-index:100;">
        <div style="text-align:center;">
          <h2 style="font-size:28px;letter-spacing:4px;margin-bottom:10px;">CLICK TO PLAY</h2>
          <p style="color:#888;">WASD move | Mouse look | Left-click shoot | ESC menu</p>
        </div>
      </div>
      <div id="fps-death" style="position:fixed;top:0;left:0;width:100%;height:100%;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);z-index:100;">
        <div style="text-align:center;">
          <h2 style="font-size:32px;color:#ff2222;letter-spacing:4px;">YOU DIED</h2>
          <p id="fps-respawn-text" style="color:#888;margin-top:10px;">Respawning in 3...</p>
        </div>
      </div>
      <div id="fps-back-btn" style="position:absolute;top:15px;left:15px;pointer-events:auto;cursor:pointer;background:rgba(0,0,0,0.6);padding:6px 12px;border:1px solid #555;border-radius:4px;font-size:12px;letter-spacing:2px;">← MENU</div>
    `;
    document.body.appendChild(hud);

    this.hud = {
      healthBar: null, healthText: null, score: null, killfeed: null,
      damageFlash: null, overlay: null, death: null, respawnText: null
    };

    // Will be set after DOM is ready
    setTimeout(() => {
      this.hud.healthBar = document.getElementById('fps-health-bar');
      this.hud.healthText = document.getElementById('fps-health-text');
      this.hud.score = document.getElementById('fps-score');
      this.hud.killfeed = document.getElementById('fps-killfeed');
      this.hud.damageFlash = document.getElementById('fps-damage-flash');
      this.hud.overlay = document.getElementById('fps-overlay');
      this.hud.death = document.getElementById('fps-death');
      this.hud.respawnText = document.getElementById('fps-respawn-text');

      document.getElementById('fps-back-btn').addEventListener('click', () => {
        this.stop();
        location.reload();
      });
    }, 0);
  },

  // ── Input ────────────────────────────────────────────────

  /** Bind keyboard (WASD), mouse (shoot), and pointer lock events. */
  _setupInput() {
    document.addEventListener('keydown', (e) => {
      const k = e.key.toLowerCase();
      if (k in this.keys) this.keys[k] = true;
    });
    document.addEventListener('keyup', (e) => {
      const k = e.key.toLowerCase();
      if (k in this.keys) this.keys[k] = false;
    });
    document.addEventListener('mousedown', (e) => { if (e.button === 0) this.shooting = true; });
    document.addEventListener('mouseup', (e) => { if (e.button === 0) this.shooting = false; });

    this.renderer.domElement.addEventListener('click', () => {
      if (!this.controls.isLocked) {
        this.controls.lock();
        GameAudio.resume();
      }
    });

    document.addEventListener('pointerlockchange', () => {
      if (this.hud.overlay) {
        this.hud.overlay.style.display = this.controls.isLocked ? 'none' : (this.running ? 'flex' : 'none');
      }
    });
  },

  // ── Arena Construction ───────────────────────────────────

  /** Build the 64x64 arena: floor, walls, and obstacle crates. */
  _buildArena() {
    const s = this.scene;
    this.collidables = [];

    // Floor
    const floorMat = new THREE.MeshLambertMaterial({ color: 0x334433 });
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(64, 64), floorMat);
    floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true;
    s.add(floor);

    // Grid
    s.add(new THREE.GridHelper(64, 32, 0x223322, 0x223322));

    // Walls
    const wallMat = new THREE.MeshLambertMaterial({ color: 0x555566 });
    const wallH = 6, sz = 32;
    this._addWall(s, wallMat, 64, wallH, 1, 0, wallH/2, -sz);
    this._addWall(s, wallMat, 64, wallH, 1, 0, wallH/2, sz);
    this._addWall(s, wallMat, 1, wallH, 64, sz, wallH/2, 0);
    this._addWall(s, wallMat, 1, wallH, 64, -sz, wallH/2, 0);

    // Obstacles
    const obsMat = new THREE.MeshLambertMaterial({ color: 0x666677 });
    const crateMat = new THREE.MeshLambertMaterial({ color: 0x887755 });
    [
      { w:6,h:3,d:1.5,x:0,z:0,m:obsMat }, { w:4,h:2.5,d:1.5,x:-18,z:-18,m:crateMat },
      { w:1.5,h:2.5,d:4,x:-10,z:-8,m:obsMat }, { w:3,h:2,d:3,x:-22,z:-5,m:crateMat },
      { w:4,h:2.5,d:1.5,x:18,z:18,m:crateMat }, { w:1.5,h:2.5,d:4,x:10,z:8,m:obsMat },
      { w:3,h:2,d:3,x:22,z:5,m:crateMat }, { w:5,h:2.5,d:1,x:-8,z:15,m:obsMat },
      { w:5,h:2.5,d:1,x:8,z:-15,m:obsMat }, { w:1,h:2.5,d:5,x:15,z:-5,m:obsMat },
      { w:1,h:2.5,d:5,x:-15,z:5,m:obsMat }, { w:2,h:2,d:2,x:5,z:10,m:crateMat },
      { w:2,h:2,d:2,x:-5,z:-10,m:crateMat },
    ].forEach(o => {
      this._addWall(s, o.m, o.w, o.h, o.d, o.x, o.h/2, o.z);
    });
  },

  /** Helper: add a collidable box to the scene. */
  _addWall(scene, mat, w, h, d, x, y, z) {
    const geo = new THREE.BoxGeometry(w, h, d);
    geo.computeBoundingBox();
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    mesh.castShadow = true; mesh.receiveShadow = true;
    scene.add(mesh);
    this.collidables.push(mesh);
  },

  /** Build the enemy bot mesh (body, head, eyes, floating health bar). */
  _buildBot() {
    const group = new THREE.Group();
    // Body
    const bodyMat = new THREE.MeshLambertMaterial({ color: 0xcc3333 });
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.2, 0.4), bodyMat);
    body.position.y = 1.1; group.add(body);
    // Head
    const headMat = new THREE.MeshLambertMaterial({ color: 0xddaa88 });
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.35, 0.35), headMat);
    head.position.y = 1.85; group.add(head);
    // Eyes
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
    [-0.08, 0.08].forEach(x => {
      const eye = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.04, 0.02), eyeMat);
      eye.position.set(x, 1.88, 0.18); group.add(eye);
    });
    // Health bar
    const hbBg = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.08),
      new THREE.MeshBasicMaterial({ color: 0x333333, side: THREE.DoubleSide }));
    hbBg.position.y = 2.2; group.add(hbBg);
    this.botHealthBarFg = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.06),
      new THREE.MeshBasicMaterial({ color: 0x44ff44, side: THREE.DoubleSide }));
    this.botHealthBarFg.position.set(0, 2.2, 0.001); group.add(this.botHealthBarFg);

    group.position.set(25, 0, 25);
    this.botMesh = group;
    this.botPosition.set(25, this.eyeHeight, 25);
    this.botWaypoint.set(Math.random() * 40 - 20, this.eyeHeight, Math.random() * 40 - 20);
    this.scene.add(group);
  },

  // ── Physics ──────────────────────────────────────────────

  /** Slide collision: push the player out of any overlapping obstacle. */
  _resolveCollision(current, proposed) {
    const adjusted = proposed.clone();
    const r = 0.4;
    for (const obj of this.collidables) {
      if (!obj.geometry.boundingBox) continue;
      const box = obj.geometry.boundingBox.clone();
      box.min.add(obj.position); box.max.add(obj.position);
      box.min.x -= r; box.min.z -= r; box.max.x += r; box.max.z += r;
      if (adjusted.x > box.min.x && adjusted.x < box.max.x && adjusted.z > box.min.z && adjusted.z < box.max.z) {
        const dists = [
          { a:'x', v: box.max.x - adjusted.x, d:1 }, { a:'x', v: adjusted.x - box.min.x, d:-1 },
          { a:'z', v: box.max.z - adjusted.z, d:1 }, { a:'z', v: adjusted.z - box.min.z, d:-1 }
        ].sort((a,b) => a.v - b.v);
        const n = dists[0];
        adjusted[n.a] = n.d === 1 ? box.max[n.a] : box.min[n.a];
      }
    }
    return adjusted;
  },

  // ── Game Loop ────────────────────────────────────────────

  /** Main render/update loop (called via requestAnimationFrame). */
  _loop() {
    if (!this.running) return;
    requestAnimationFrame(() => this._loop());

    const now = performance.now();
    const dt = Math.min((now - this.lastTime) / 1000, 0.1);
    this.lastTime = now;

    // Remove old tracers
    this.tracers = this.tracers.filter(t => {
      if (now - t.created > 80) { this.scene.remove(t.line); t.line.geometry.dispose(); t.line.material.dispose(); return false; }
      return true;
    });

    if (!this.alive) {
      this.botRespawnTimer += dt;
      const remaining = Math.ceil(3 - this.botRespawnTimer);
      if (this.hud.respawnText) this.hud.respawnText.textContent = 'Respawning in ' + Math.max(0, remaining) + '...';
      if (this.botRespawnTimer >= 3) {
        this.botRespawnTimer = 0;
        this.alive = true;
        this.health = 100;
        this.position.set(-25, this.eyeHeight, -25);
        this.camera.position.copy(this.position);
        if (this.hud.death) this.hud.death.style.display = 'none';
        if (this.hud.overlay) this.hud.overlay.style.display = 'flex';
      }
      this.renderer.render(this.scene, this.camera);
      return;
    }

    if (!this.botAlive) {
      this.botRespawnTimer += dt;
      if (this.botRespawnTimer >= 3) {
        this.botRespawnTimer = 0;
        this.botAlive = true;
        this.botHealth = 100;
        this.botPosition.set(25, this.eyeHeight, 25);
        this.botMesh.position.set(25, 0, 25);
        this.botMesh.visible = true;
        this._updateBotHealthBar();
      }
    }

    if (this.controls.isLocked && this.alive) {
      this._updatePlayer(dt);
      this._updateBot(dt);
    }

    // Make bot health bar face player
    if (this.botMesh.visible) {
      this.botMesh.lookAt(this.camera.position.x, this.botMesh.position.y, this.camera.position.z);
    }

    this._updateHUD();
    this.renderer.render(this.scene, this.camera);
  },

  /** Move the player based on WASD keys and handle shooting. */
  _updatePlayer(dt) {
    const dir = new THREE.Vector3();
    if (this.keys.w) dir.z -= 1;
    if (this.keys.s) dir.z += 1;
    if (this.keys.a) dir.x -= 1;
    if (this.keys.d) dir.x += 1;

    if (dir.length() > 0) {
      dir.normalize();
      const forward = new THREE.Vector3();
      this.camera.getWorldDirection(forward);
      forward.y = 0; forward.normalize();
      const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0,1,0)).normalize();
      const moveDir = new THREE.Vector3().addScaledVector(forward, -dir.z).addScaledVector(right, dir.x).normalize();

      const proposed = this.position.clone().addScaledVector(moveDir, this.speed * dt);
      proposed.y = this.eyeHeight;
      const resolved = this._resolveCollision(this.position, proposed);
      resolved.y = this.eyeHeight;
      this.position.copy(resolved);
      this.camera.position.copy(resolved);

      this.footstepTimer += dt;
      if (this.footstepTimer >= 0.35) { this.footstepTimer = 0; GameAudio.playFootstep(); }
    }

    // Shoot
    if (this.shooting && performance.now() >= this.lastShotTime + this.shotCooldown) {
      this.lastShotTime = performance.now();
      GameAudio.playShoot();

      this.raycaster.setFromCamera(new THREE.Vector2(0,0), this.camera);
      const botParts = this.botMesh.children;
      const hits = this.raycaster.intersectObjects(botParts, true);

      let endpoint;
      if (hits.length > 0 && this.botAlive) {
        endpoint = hits[0].point;
        this.botHealth = Math.max(0, this.botHealth - 15);
        this._updateBotHealthBar();
        // Flash bot red
        const head = this.botMesh.children[1];
        const oc = head.material.color.getHex();
        head.material.color.setHex(0xff0000);
        setTimeout(() => head.material.color.setHex(oc), 100);

        if (this.botHealth <= 0) {
          this.botAlive = false;
          this.botMesh.visible = false;
          this.botRespawnTimer = 0;
          this.kills++;
          this._addKillMsg('You killed Bot');
          GameAudio.playKill();
        }
      } else {
        const wallHits = this.raycaster.intersectObjects(this.collidables);
        endpoint = wallHits.length > 0 ? wallHits[0].point : this.raycaster.ray.at(100, new THREE.Vector3());
      }

      // Tracer
      const points = [this.camera.position.clone(), endpoint];
      const geo = new THREE.BufferGeometry().setFromPoints(points);
      const line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0xffff66, transparent: true, opacity: 0.6 }));
      this.scene.add(line);
      this.tracers.push({ line, created: performance.now() });
    }
  },

  // ── Bot AI ───────────────────────────────────────────────

  /** Update bot behavior: patrol -> chase -> attack based on distance. */
  _updateBot(dt) {
    if (!this.botAlive) return;

    const toPlayer = new THREE.Vector3().subVectors(this.position, this.botPosition);
    const dist = toPlayer.length();
    toPlayer.normalize();

    // State transitions based on distance to player
    if (dist < 30) {
      this.botState = 'chase';
      if (dist < 25) this.botState = 'attack';
    } else {
      this.botState = 'patrol';
    }

    const botSpeed = 6;

    if (this.botState === 'patrol') {
      const toWp = new THREE.Vector3().subVectors(this.botWaypoint, this.botPosition);
      if (toWp.length() < 2) {
        this.botWaypoint.set(Math.random() * 50 - 25, this.eyeHeight, Math.random() * 50 - 25);
      }
      toWp.y = 0; toWp.normalize();
      const proposed = this.botPosition.clone().addScaledVector(toWp, botSpeed * dt);
      proposed.y = this.eyeHeight;
      this.botPosition.copy(this._resolveCollision(this.botPosition, proposed));
    } else if (this.botState === 'chase') {
      const moveDir = toPlayer.clone(); moveDir.y = 0; moveDir.normalize();
      const proposed = this.botPosition.clone().addScaledVector(moveDir, botSpeed * dt);
      proposed.y = this.eyeHeight;
      this.botPosition.copy(this._resolveCollision(this.botPosition, proposed));
    } else if (this.botState === 'attack') {
      // Shoot at player
      this.botShootTimer += dt;
      if (this.botShootTimer >= 0.5) {
        this.botShootTimer = 0;
        // Inaccuracy
        const spread = 0.08;
        const dir = toPlayer.clone();
        dir.x += (Math.random() - 0.5) * spread * 2;
        dir.y += (Math.random() - 0.5) * spread * 2;
        dir.normalize();
        const angle = dir.angleTo(toPlayer);
        GameAudio.playShoot();

        // Tracer from bot
        const from = this.botPosition.clone(); from.y += 0.3;
        const to = from.clone().add(dir.clone().multiplyScalar(15));
        const geo = new THREE.BufferGeometry().setFromPoints([from, to]);
        const line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0xff6666, transparent: true, opacity: 0.5 }));
        this.scene.add(line);
        this.tracers.push({ line, created: performance.now() });

        if (angle < 0.12) {
          this.health = Math.max(0, this.health - 15);
          if (this.hud.damageFlash) {
            this.hud.damageFlash.style.opacity = '1';
            setTimeout(() => this.hud.damageFlash.style.opacity = '0', 200);
          }
          GameAudio.playDamage();
          if (this.health <= 0) {
            this.alive = false;
            this.deaths++;
            this.botRespawnTimer = 0;
            this._addKillMsg('Bot killed you');
            if (this.hud.death) this.hud.death.style.display = 'flex';
          }
        }
      }
    }

    this.botMesh.position.set(this.botPosition.x, 0, this.botPosition.z);
  },

  // ── HUD Updates ─────────────────────────────────────────

  /** Update the floating health bar above the bot's head. */
  _updateBotHealthBar() {
    if (this.botHealthBarFg) {
      const scale = this.botHealth / 100;
      this.botHealthBarFg.scale.x = scale;
      this.botHealthBarFg.position.x = -(1 - scale) * 0.4;
      this.botHealthBarFg.material.color.setHex(this.botHealth > 60 ? 0x44ff44 : this.botHealth > 30 ? 0xffcc00 : 0xff4444);
    }
  },

  _updateHUD() {
    if (!this.hud.healthBar) return;
    const pct = Math.max(0, this.health);
    this.hud.healthBar.style.width = pct + '%';
    this.hud.healthText.textContent = 'HP: ' + Math.round(pct);
    this.hud.healthBar.style.background = pct > 60 ? 'linear-gradient(90deg,#44ff44,#22cc22)' :
      pct > 30 ? 'linear-gradient(90deg,#ffcc00,#cc9900)' : 'linear-gradient(90deg,#ff4444,#cc2222)';
    this.hud.score.textContent = 'Kills: ' + this.kills + ' | Deaths: ' + this.deaths;
  },

  _addKillMsg(msg) {
    if (!this.hud.killfeed) return;
    const div = document.createElement('div');
    div.style.cssText = 'background:rgba(0,0,0,0.6);padding:4px 10px;margin-bottom:3px;border-radius:3px;animation:fadeOut 3s forwards;';
    div.textContent = msg;
    this.hud.killfeed.appendChild(div);
    setTimeout(() => { if (div.parentNode) div.parentNode.removeChild(div); }, 3500);
  },

  // ── Cleanup ─────────────────────────────────────────────

  /** Stop the game loop and remove all FPS DOM elements. */
  stop() {
    this.running = false;
    if (this.controls && this.controls.isLocked) this.controls.unlock();
    const hud = document.getElementById('fps-hud');
    if (hud) hud.remove();
    const canvas = this.renderer ? this.renderer.domElement : null;
    if (canvas && canvas.parentNode) canvas.parentNode.removeChild(canvas);
  }
};

// ════════════════════════════════════════════════════════════
// ENTRY POINT
// ════════════════════════════════════════════════════════════
// ============================================================
// main.js -- Entry point & menu wiring
// Hooks up all menu buttons to the Game, Network, and
// FPSGame modules. Runs once on page load.
// ============================================================

(function () {
  Game.init();

  // ── DOM References ───────────────────────────────────────
  const hubMenu         = document.getElementById('hub-menu');
  const bsMenu          = document.getElementById('menu');
  const fpsMenu         = document.getElementById('fps-menu');
  const onlineMenu      = document.getElementById('online-menu');
  const waitingRoom     = document.getElementById('waiting-room');
  const roomCodeDisplay = document.getElementById('room-code-display');

  // ── Hub Menu (hidden -- reserved for multi-game hub) ─────
  document.getElementById('btn-buckshot').addEventListener('click', () => {
    hubMenu.classList.add('hidden');

    // Offer to resume a saved offline game
    const saved = SaveSystem.load();
    if (saved && saved.mode === 'offline') {
      if (confirm('Resume saved game? (Round ' + (saved.round || 1) + ')')) {
        bsMenu.classList.add('hidden');
        Game.restore(saved);
        return;
      } else {
        SaveSystem.clear();
      }
    }
    bsMenu.classList.remove('hidden');
  });

  document.getElementById('btn-fps').addEventListener('click', () => {
    hubMenu.classList.add('hidden');
    fpsMenu.classList.remove('hidden');
  });

  // ── Buckshot Roulette Menus ──────────────────────────────

  document.getElementById('btn-offline').addEventListener('click', () => {
    bsMenu.classList.add('hidden');
    SaveSystem.clear();
    Game.start('offline');
  });

  document.getElementById('btn-online').addEventListener('click', () => {
    bsMenu.classList.add('hidden');
    onlineMenu.classList.remove('hidden');
  });

  document.getElementById('btn-back').addEventListener('click', () => {
    onlineMenu.classList.add('hidden');
    bsMenu.classList.remove('hidden');
  });

  document.getElementById('btn-back-hub').addEventListener('click', () => {
    bsMenu.classList.add('hidden');
    hubMenu.classList.remove('hidden');
  });

  // ── Online: Create Room ──────────────────────────────────

  document.getElementById('btn-create-room').addEventListener('click', () => {
    Network.connect();
    Network.createRoom();
    onlineMenu.classList.add('hidden');
    waitingRoom.classList.remove('hidden');

    // Poll until the server sends back a room code
    const checkCode = setInterval(() => {
      if (Network.roomCode) {
        clearInterval(checkCode);
        roomCodeDisplay.textContent = Network.roomCode;
      }
    }, 100);

    Network.onGameStart = () => {
      waitingRoom.classList.add('hidden');
      Game.start('online');
    };
  });

  // ── Online: Join Room ────────────────────────────────────

  document.getElementById('btn-join-room').addEventListener('click', () => {
    const code = document.getElementById('input-room-code').value.trim().toUpperCase();
    if (code.length !== 4) { alert('Enter a 4-character room code'); return; }

    Network.connect();
    Network.onGameStart = () => {
      onlineMenu.classList.add('hidden');
      Game.start('online');
    };
    Network.joinRoom(code);
  });

  document.getElementById('btn-cancel-wait').addEventListener('click', () => {
    Network.leaveRoom();
    waitingRoom.classList.add('hidden');
    bsMenu.classList.remove('hidden');
  });

  // ── Game Over ────────────────────────────────────────────

  document.getElementById('btn-play-again').addEventListener('click', () => {
    document.getElementById('game-over').classList.add('hidden');
    Game.start(Game.mode);
  });

  document.getElementById('btn-main-menu').addEventListener('click', () => {
    location.reload();
  });

  // ── Pause ────────────────────────────────────────────────

  document.getElementById('btn-resume').addEventListener('click', () => Game.resume());
  document.getElementById('btn-quit').addEventListener('click', () => Game.quit());

  document.addEventListener('keydown', (e) => {
    const gameVisible = Game.els && Game.els.gameScreen
      && !Game.els.gameScreen.classList.contains('hidden');
    if (e.key === 'Escape' && !Game.gameOver && gameVisible) {
      Game.togglePause();
    }
  });

  // ── FPS Arena (hidden mode) ──────────────────────────────

  document.getElementById('btn-fps-start').addEventListener('click', () => {
    fpsMenu.classList.add('hidden');
    FPSGame.init();
  });

  document.getElementById('btn-fps-back').addEventListener('click', () => {
    fpsMenu.classList.add('hidden');
    hubMenu.classList.remove('hidden');
  });
})();
  </script>
</body>
</html>
